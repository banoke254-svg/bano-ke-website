<!DOCTYPE html>
<html>
<head>
  <title>BANO KE Pitch Deck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050008;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 25px;
      background:
        radial-gradient(circle at top, rgba(180, 0, 255, 0.28), transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 0, 200, 0.18), transparent 35%),
        #050008;
    }

    .top-bar {
      max-width: 1250px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 900;
      letter-spacing: 3px;
      color: #f3d6ff;
      text-shadow: 0 0 18px #b000ff;
      font-size: 24px;
    }

    .home-link {
      color: white;
      text-decoration: none;
      font-weight: bold;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(220, 90, 255, 0.55);
      padding: 12px 20px;
      border-radius: 14px;
    }

    .viewer {
      max-width: 1250px;
      margin: auto;
      text-align: center;
    }

    .slide-box {
      width: 100%;
      background: rgba(20, 0, 35, 0.65);
      border: 1px solid rgba(220, 90, 255, 0.55);
      border-radius: 24px;
      padding: 14px;
      box-shadow:
        0 0 45px rgba(180, 0, 255, 0.45),
        inset 0 0 25px rgba(255, 255, 255, 0.04);
    }

    .main-slide {
      width: 100%;
      max-height: 72vh;
      object-fit: contain;
      border-radius: 16px;
      display: block;
      background: black;
    }

    .controls {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 14px 28px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7a00ff, #ff00d4);
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(190, 0, 255, 0.75);
      font-size: 16px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 35px rgba(255, 0, 212, 0.9);
    }

    .counter {
      font-weight: bold;
      color: #f2d8ff;
      font-size: 18px;
    }

    .thumbs {
      max-width: 1250px;
      margin: 18px auto 0;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 12px 5px 20px;
    }

    .thumb {
      min-width: 130px;
      width: 130px;
      height: 74px;
      border-radius: 12px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.65;
      border: 2px solid transparent;
      transition: 0.2s;
      background: black;
    }

    .thumb.active {
      opacity: 1;
      border-color: #d400ff;
      box-shadow: 0 0 20px #b000ff;
      transform: scale(1.06);
    }

    .hint {
      text-align: center;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 10px;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .page {
        padding: 12px;
      }

      .top-bar {
        gap: 12px;
      }

      .logo {
        font-size: 18px;
      }

      .main-slide {
        max-height: 58vh;
      }

      .thumb {
        min-width: 90px;
        width: 90px;
        height: 52px;
      }

      button {
        padding: 12px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="top-bar">
      <div class="logo">BANO KE PITCH DECK</div>
      <a class="home-link" href="index.html">Home</a>
    </div>

    <div class="viewer">
      <div class="slide-box">
        <img id="mainSlide" class="main-slide" src="slides/Slider%20Banoke/1.png" alt="BANO KE pitch slide">
      </div>

      <div class="controls">
        <button onclick="prevSlide()">Back</button>

        <div class="counter">
          Slide <span id="currentNumber">1</span> / <span id="totalNumber">14</span>
        </div>

        <button onclick="nextSlide()">Next</button>
      </div>

      <div class="hint">
        You can also use keyboard arrow keys or swipe on mobile.
      </div>
    </div>

    <div id="thumbs" class="thumbs"></div>

  </div>

  <script>
    const slides = [
      "slides/Slider%20Banoke/1.png",
      "slides/Slider%20Banoke/2.png",
      "slides/Slider%20Banoke/3.png",
      "slides/Slider%20Banoke/4.png",
      "slides/Slider%20Banoke/5.png",
      "slides/Slider%20Banoke/6.png",
      "slides/Slider%20Banoke/7.png",
      "slides/Slider%20Banoke/8.png",
      "slides/Slider%20Banoke/9.png",
      "slides/Slider%20Banoke/10.png",
      "slides/Slider%20Banoke/11.png",
      "slides/Slider%20Banoke/12.png",
      "slides/Slider%20Banoke/13.png",
      "slides/Slider%20Banoke/14.png"
    ];

    let current = 0;

    const mainSlide = document.getElementById("mainSlide");
    const currentNumber = document.getElementById("currentNumber");
    const totalNumber = document.getElementById("totalNumber");
    const thumbs = document.getElementById("thumbs");

    totalNumber.textContent = slides.length;

    slides.forEach(function(src, index) {
      const img = document.createElement("img");
      img.src = src;
      img.className = "thumb";
      img.alt = "Slide " + (index + 1);

      img.onclick = function() {
        showSlide(index);
      };

      thumbs.appendChild(img);
    });

    function showSlide(index) {
      if (index < 0) {
        current = slides.length - 1;
      } else if (index >= slides.length) {
        current = 0;
      } else {
        current = index;
      }

      mainSlide.src = slides[current];
      currentNumber.textContent = current + 1;

      const allThumbs = document.querySelectorAll(".thumb");

      allThumbs.forEach(function(thumb) {
        thumb.classList.remove("active");
      });

      allThumbs[current].classList.add("active");

      allThumbs[current].scrollIntoView({
        behavior: "smooth",
        inline: "center",
        block: "nearest"
      });
    }

    function nextSlide() {
      showSlide(current + 1);
    }

    function prevSlide() {
      showSlide(current - 1);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowRight") {
        nextSlide();
      }

      if (event.key === "ArrowLeft") {
        prevSlide();
      }
    });

    let touchStartX = 0;

    document.addEventListener("touchstart", function(event) {
      touchStartX = event.changedTouches[0].screenX;
    });

    document.addEventListener("touchend", function(event) {
      let touchEndX = event.changedTouches[0].screenX;

      if (touchStartX - touchEndX > 60) {
        nextSlide();
      }

      if (touchEndX - touchStartX > 60) {
        prevSlide();
      }
    });

    showSlide(0);
  </script>

</body>
</html>
