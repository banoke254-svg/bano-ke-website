<!DOCTYPE html>
<html>
<head>
  <title>BANO KE Pitch Deck</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050008;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 25px;
      background:
        radial-gradient(circle at top, rgba(180, 0, 255, 0.25), transparent 35%),
        radial-gradient(circle at bottom, rgba(255, 0, 200, 0.18), transparent 35%),
        #050008;
    }

    .top-bar {
      max-width: 1200px;
      margin: 0 auto 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 900;
      letter-spacing: 2px;
      color: #f3d6ff;
      text-shadow: 0 0 18px #b000ff;
    }

    .home-link {
      color: white;
      text-decoration: none;
      font-weight: bold;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(220,90,255,0.45);
      padding: 10px 16px;
      border-radius: 12px;
    }

    .viewer {
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    .slide-box {
      width: 100%;
      background: rgba(20, 0, 35, 0.65);
      border: 1px solid rgba(220, 90, 255, 0.45);
      border-radius: 22px;
      padding: 12px;
      box-shadow: 0 0 40px rgba(180, 0, 255, 0.45);
    }

    .main-slide {
      width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 14px;
      display: block;
      background: black;
    }

    .controls {
      margin: 18px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 13px 24px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7a00ff, #ff00d4);
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(190, 0, 255, 0.7);
    }

    .counter {
      font-weight: bold;
      color: #f2d8ff;
    }

    .thumbs {
      max-width: 1200px;
      margin: 18px auto 0;
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 12px 5px 18px;
    }

    .thumb {
      min-width: 120px;
      width: 120px;
      height: 68px;
      border-radius: 10px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.65;
      border: 2px solid transparent;
      transition: 0.2s;
      background: black;
    }

    .thumb.active {
      opacity: 1;
      border-color: #b000ff;
      box-shadow: 0 0 18px #b000ff;
      transform: scale(1.05);
    }

    @media (max-width: 700px) {
      .page {
        padding: 12px;
      }

      .main-slide {
        max-height: 58vh;
      }

      .thumb {
        min-width: 90px;
        width: 90px;
        height: 52px;
      }
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="top-bar">
      <div class="logo">BANO KE PITCH DECK</div>
      <a class="home-link" href="index.html">Home</a>
    </div>

    <div class="viewer">
      <div class="slide-box">
        <img id="mainSlide" class="main-slide" src="slides/slide1.png" alt="BANO KE pitch slide">
      </div>

      <div class="controls">
        <button onclick="prevSlide()">Back</button>
        <div class="counter">
          Slide <span id="currentNumber">1</span> / <span id="totalNumber">14</span>
        </div>
        <button onclick="nextSlide()">Next</button>
      </div>
    </div>

    <div id="thumbs" class="thumbs"></div>

  </div>

  <script>
    const slides = [
      "slides/slide1.png",
      "slides/slide2.png",
      "slides/slide3.png",
      "slides/slide4.png",
      "slides/slide5.png",
      "slides/slide6.png",
      "slides/slide7.png",
      "slides/slide8.png",
      "slides/slide9.png",
      "slides/slide10.png",
      "slides/slide11.png",
      "slides/slide12.png",
      "slides/slide13.png",
      "slides/slide14.png"
    ];

    let current = 0;

    const mainSlide = document.getElementById("mainSlide");
    const currentNumber = document.getElementById("currentNumber");
    const totalNumber = document.getElementById("totalNumber");
    const thumbs = document.getElementById("thumbs");

    totalNumber.textContent = slides.length;

    slides.forEach(function(src, index) {
      const img = document.createElement("img");
      img.src = src;
      img.className = "thumb";
      img.onclick = function() {
        showSlide(index);
      };
      thumbs.appendChild(img);
    });

    function showSlide(index) {
      if (index < 0) {
        current = slides.length - 1;
      } else if (index >= slides.length) {
        current = 0;
      } else {
        current = index;
      }

      mainSlide.src = slides[current];
      currentNumber.textContent = current + 1;

      const allThumbs = document.querySelectorAll(".thumb");
      allThumbs.forEach(function(thumb) {
        thumb.classList.remove("active");
      });

      allThumbs[current].classList.add("active");
      allThumbs[current].scrollIntoView({
        behavior: "smooth",
        inline: "center",
        block: "nearest"
      });
    }

    function nextSlide() {
      showSlide(current + 1);
    }

    function prevSlide() {
      showSlide(current - 1);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowRight") {
        nextSlide();
      }

      if (event.key === "ArrowLeft") {
        prevSlide();
      }
    });

    showSlide(0);
  </script>

</body>
</html>
